name: Build Windows Standalone

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-standalone:
    name: Build TaiJianICU.exe
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Build standalone executable
        shell: pwsh
        run: .\scripts\build-standalone.ps1 -Python python

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaiJianICU-windows-standalone
          path: |
            dist/TaiJianICU.exe
            dist/.env.example
          if-no-files-found: error
          retention-days: 14
